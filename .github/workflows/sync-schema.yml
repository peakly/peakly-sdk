name: Sync OpenAPI schema

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  sync:
    name: Regenerate schema from live API
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate schema
        run: bash scripts/generate.sh https://api.peakly.ar/openapi.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/schema.d.ts && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR if schema changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-openapi-schema
          commit-message: "chore: sync schema from live OpenAPI spec"
          title: "chore: sync OpenAPI schema"
          body: |
            Auto-generated by the `sync-schema` workflow.

            Regenerated `src/schema.d.ts` from `https://api.peakly.ar/openapi.json`.

            Review the diff and merge once CI is green.
          labels: dependencies
